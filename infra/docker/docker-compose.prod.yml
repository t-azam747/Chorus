version: '3.8'

# ── Production Docker Compose ────────────────────────────────────────────────
# For deploying on a single server (VPS, EC2, DigitalOcean Droplet, etc.)
#
# Usage:
#   1. Copy .env.example to .env.prod and fill in all values
#   2. docker compose -f infra/docker/docker-compose.prod.yml --env-file .env.prod up -d
#
# NOTE: In production, use managed PostgreSQL + Redis (e.g. Supabase + Upstash)
# and point DATABASE_URL / REDIS_URL to those external services instead.
# Remove the `postgres` and `redis` services below in that case.

services:
  # ── PostgreSQL + pgvector ─────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chorus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-chorus}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-chorus}']
      interval: 10s
      timeout: 5s
      retries: 5
    # Don't expose port 5432 in production — only internal access

  # ── Redis ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DB Migration (runs once, then exits) ───────
  migrate:
    image: ghcr.io/${GITHUB_REPO}/chorus-api:${IMAGE_TAG:-latest}
    command: node dist/db/migrate.js
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chorus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chorus}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  # ── API ────────────────────────────────────────
  api:
    image: ghcr.io/${GITHUB_REPO}/chorus-api:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-chorus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chorus}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      CALLBACK_URL: ${CALLBACK_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Worker ─────────────────────────────────────
  worker:
    image: ghcr.io/${GITHUB_REPO}/chorus-worker:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    depends_on:
      redis:
        condition: service_healthy

  # ── Web ────────────────────────────────────────
  web:
    image: ghcr.io/${GITHUB_REPO}/chorus-web:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
