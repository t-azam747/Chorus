version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: chorus

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - '3001:3001'
    env_file: ../../.env
    depends_on:
      - mongo
      - redis

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    env_file: ../../.env
    depends_on:
      - mongo
      - redis

  mcp:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.mcp
    ports:
      - '3002:3002'
    env_file: ../../.env
    depends_on:
      - api

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - '3000:3000'
    env_file: ../../.env
    depends_on:
      - api

volumes:
  mongo-data:
  redis-data:
