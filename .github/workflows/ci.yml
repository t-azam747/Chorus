name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx turbo type-check

      - name: Lint
        run: npx turbo lint

      - name: Unit tests
        run: npx turbo test

      - name: Check contracts
        run: npx tsx infra/scripts/check-contracts.ts

  integration:
    runs-on: ubuntu-latest
    needs: ci
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Integration tests
        run: npx turbo test -- --integration
        env:
          MONGODB_URI: mongodb://localhost:27017/chorus-test
          REDIS_URL: redis://localhost:6379
