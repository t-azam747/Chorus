name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full CI
        run: |
          npx turbo type-check
          npx turbo lint
          npx turbo test

      - name: Build all packages
        run: npx turbo build

      - name: Deploy API
        run: echo "Deploy API to Railway"
        # railway up --service api

      - name: Deploy Worker
        run: echo "Deploy Worker to Railway"
        # railway up --service worker

      - name: Deploy MCP
        run: echo "Deploy MCP to Railway"
        # railway up --service mcp

      - name: Deploy Web
        run: echo "Deploy Web to Railway"
        # railway up --service web

      - name: Post-deploy smoke tests
        run: echo "Running smoke tests..."
