name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # ── Build API image ────────────────────────
      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/chorus-api:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}/chorus-api:${{ steps.tag.outputs.TAG }}

      # ── Build Worker image ─────────────────────
      - name: Build & push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/chorus-worker:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}/chorus-worker:${{ steps.tag.outputs.TAG }}

      # ── Build Web image ────────────────────────
      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/chorus-web:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}/chorus-web:${{ steps.tag.outputs.TAG }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ env.REPO }}/chorus-api:${{ steps.tag.outputs.TAG }}
            docker pull ghcr.io/${{ env.REPO }}/chorus-worker:${{ steps.tag.outputs.TAG }}
            docker pull ghcr.io/${{ env.REPO }}/chorus-web:${{ steps.tag.outputs.TAG }}

            # Redeploy with zero downtime
            cd /opt/chorus
            IMAGE_TAG=${{ steps.tag.outputs.TAG }} \
            GITHUB_REPO=${{ env.REPO }} \
            docker compose -f infra/docker/docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans

            # Clean up old images
            docker image prune -f
